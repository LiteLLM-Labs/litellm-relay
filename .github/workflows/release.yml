name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package, for example v0.1.0"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  package-macos:
    name: Package macOS binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            artifact: x86_64-apple-darwin
          - os: macos-15
            artifact: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release --locked
      - name: Package artifact
        env:
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          name="litellm-relay-${TAG_NAME}-${{ matrix.artifact }}"
          mkdir -p "dist/$name"
          cp target/release/litellm-relay "dist/$name/"
          cp README.md LICENSE "dist/$name/"
          tar -C dist -czf "dist/$name.tar.gz" "$name"
          shasum -a 256 "dist/$name.tar.gz" > "dist/$name.tar.gz.sha256"
      - name: Build macOS installer package
        env:
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"
          pkg="dist/litellm-relay-${TAG_NAME}-${{ matrix.artifact }}.pkg"
          ./scripts/build-macos-pkg.sh \
            --version "$version" \
            --binary target/release/litellm-relay \
            --output "$pkg"
          shasum -a 256 "$pkg" > "$pkg.sha256"
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: litellm-relay-${{ matrix.artifact }}
          path: dist/*

  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/litellm-labs/litellm-relay
          tags: |
            type=ref,event=tag
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
